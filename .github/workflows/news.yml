name: 中文新闻推送
on:
  schedule:
    - cron: '0 8,18 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行脚本
        run: python3 get_news.py

      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 每日新闻摘要
          to: 313413666@qq.com
          from: 新闻助手 <${{ secrets.MAIL_USER }}>
          body: file://news.txt
