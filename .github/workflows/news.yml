name: 中文新闻推送
on:
  schedule:
    - cron: '0 8,18 * * *'
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: 获取微博热搜
        run: |
          echo 'import json' > get_news.py
          echo 'import urllib.request' >> get_news.py
          echo 'news = []' >> get_news.py
          echo 'news.append("今日新闻摘要")' >> get_news.py
          echo 'news.append("====================")' >> get_news.py
          echo 'try:' >> get_news.py
          echo '    url = "https://weibo.com/ajax/side/hotSearch"' >> get_news.py
          echo '    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})' >> get_news.py
          echo '    with urllib.request.urlopen(req, timeout=10) as response:' >> get_news.py
          echo '        data = json.loads(response.read())' >> get_news.py
          echo '        news.append("【微博热搜 Top 10】")' >> get_news.py
          echo '        for i, item in enumerate(data["data"]["realtime"][:10], 1):' >> get_news.py
          echo '            news.append(str(i) + ". " + item["raw_title"])' >> get_news.py
          echo 'except Exception as e:' >> get_news.py
          echo '    news.append("获取失败")' >> get_news.py
          echo 'with open("news.txt", "w", encoding="utf-8") as f:' >> get_news.py
          echo '    f.write("\n".join(news))' >> get_news.py
          python3 get_news.py

      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 每日新闻摘要
          to: 313413666@qq.com
          from: 新闻助手 <${{ secrets.MAIL_USER }}>
          body: file://news.txt
